<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Learning Cards for Kids</title>
    <style>
        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffe66d;
            --bg: #f7f9fc;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary);
            text-shadow: 2px 2px var(--accent);
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        .category-section {
            margin-bottom: 40px;
            text-align: left;
        }

        .category-title {
            background-color: var(--secondary);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 1.5rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            text-align: left;
        }

        .card-container {
            perspective: 1000px;
            height: 350px;
            cursor: pointer;
            text-align: center;
        }

        .card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        .card.is-flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
            padding: 20px;
            box-sizing: border-box;
            border: 5px solid white;
        }

        .card-front {
            background-color: white;
        }

        .card-back {
            background-color: var(--accent);
            transform: rotateY(180deg);
            text-align: center;
        }

        .icon-container {
            width: 150px;
            height: 150px;
            margin-bottom: 20px;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .icon-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 10px;
            box-sizing: border-box;
        }

        .word {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary);
            text-transform: lowercase;
            text-align: center;
        }

        .sentence {
            font-size: 1.8rem;
            line-height: 1.4;
            color: #555;
            text-align: center;
        }

        .pattern-hint {
            margin-top: 10px;
            font-style: italic;
            color: #888;
            font-size: 0.9rem;
            text-align: center;
        }

        footer {
            margin-top: 50px;
            color: #aaa;
            font-size: 0.9rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .card-container { height: 300px; }
            .word { font-size: 2rem; }
            .sentence { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
